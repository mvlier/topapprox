name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install project (base + test + plot)
        run: |
          python -m pip install --upgrade pip build
          python -m pip install -e ".[test,plot]"

      # numba 0.60 + llvmlite crashes with a fatal access violation on
      # Windows + CPython 3.10 during JIT compilation of the recursive
      # union-find kernels. All other OS / Python combinations run the
      # numba backend cleanly. Test suite skips backends that fail to
      # import, so excluding the numba extra here is enough.
      - name: Install numba extra (stable combinations only)
        if: ${{ !(matrix.os == 'windows-latest' && matrix.python-version == '3.10') }}
        run: python -m pip install -e ".[numba]"

      - name: Run tests
        run: python -m pytest -q

      - name: Build wheel
        run: python -m build --wheel
