name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install project (base + test + plot)
        run: |
          python -m pip install --upgrade pip build
          python -m pip install -e ".[test,plot]"

      # numba 0.60 + llvmlite crashes with a fatal access violation on
      # Windows + CPython 3.10 during JIT compilation of the recursive
      # union-find kernels. All other OS / Python combinations run the
      # numba backend cleanly. Test suite skips backends that fail to
      # import, so excluding the numba extra here is enough.
      - name: Install numba extra (stable combinations only)
        if: ${{ matrix.os != 'windows-latest' }}
        run: python -m pip install -e ".[numba]"

      - name: Run tests
        run: python -m pytest -q

      - name: Build wheel
        run: python -m build --wheel

      # On CPython >= 3.12 the nanobind extension is built against the stable
      # ABI, so scikit-build-core tags the wheel cp312-abi3. Below 3.12 the
      # wheel stays version-specific. Assert that this holds.
      - name: Verify wheel ABI tag
        shell: bash
        run: |
          ls -l dist/
          python -c "
          import sys, pathlib
          wheel = sorted(pathlib.Path('dist').glob('*.whl'))[-1].name
          print('built wheel:', wheel)
          want_abi3 = sys.version_info[:2] >= (3, 12)
          assert ('abi3' in wheel) == want_abi3, (wheel, sys.version)
          print('OK: stable-ABI (abi3) wheel' if want_abi3 else 'OK: version-specific wheel')
          "
